<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="settings">
         <!-- Header -->

    <!-- Side bar -->
    <aside class="sidebar">
      <div class="logo">
        <img src="img/logo.png" alt="Octom logo">
      </div>

      <!-- Menu List -->
      <nav class="menu">
        <a href=""><img src="img/dashboard-icon.svg" alt="dashboard icon"></a>
        <a href=""><img src="img/timeline.svg" alt="timeline icon"></a>
        <a href=""><img src="img/task.svg" alt="task icon"></a>
        <a href=""><img src="img/settings.svg" alt="settings icon"></a>
        <a href=""><img src="img/messages.svg" alt="messages icon"></a>
        <a href=""><img src="img/folder.svg" alt="folder icon"></a>
      </nav>
    </aside>

    <!-- Profile Bar -->
    <div class="profile-bar">
      <div class="search-icon">
        <label for="text"></label>
        <input type="text" placeholder="Search anything.. ">
      </div>
      <div class="profile-details">
        <img src="img/notification-icon.svg" alt="notification-icon">
        <img src="img/profile-avatar.svg" alt="Avatar">
      </div>
    </div>
    <!-- SETTINGS MAIN CONTAINER -->
    <section class="settings-container">
        <div class="gradient-profilepic">
            <div class="gradient-image">
                <img src="img/color-gradient.png" alt="">
            </div>
            <div class="profile-pic">
                <img src="img/profile-pic.svg" alt="">
            </div>
        </div>
        <!-- Settings nav -->
         <div class="settings-text-button">
            <div class="settings-text">
                <h2>Settings</h2>
            </div>
            <div class="settings-button">
                <button>Cancel</button>
                <button class="span">Save</button>
            </div>
         </div>
         <!-- SETTINGS NAV DETAILS -->
          <div class="settings-details">
            <h4>My details</h4>
            <h4>Profile</h4>
            <h4>Password</h4>
            <h4>Team</h4>
            <h4>Plan</h4>
            <h4>Billing</h4>
            <h4>Email</h4>
            <h4>Notifications</h4>
          </div>
    </section>
    </main>
</body>
</html>

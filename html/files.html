<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files</title>
    <link rel="stylesheet" href="../css/files.css">
    <link rel="shortcut icon" href="../img/logo.png" type="image/x-icon">
</head>
<body>
    <main class="files-container">

    <!-- Side bar -->
    <aside class="sidebar">
      <div class="logo">
        <img src="../img/logo.png" alt="Octom logo">
      </div>

      <!-- Menu List -->
      <nav class="menu">
        <a href=""><img src="../img/dashboard-icon.svg" alt="dashboard icon"></a>
        <a href=""><img src="../img/timeline.svg" alt="timeline icon"></a>
        <a href=""><img src="../img/task.svg" alt="task icon"></a>
        <a href=""><img src="../img/settings.svg" alt="settings icon"></a>
        <a href=""><img src="../img/messages.svg" alt="messages icon"></a>
        <a href=""><img src="../img/folder.svg" alt="folder icon"></a>
      </nav>
    </aside>
    <aside class="hamburger-menu">
      <div class="hamburger">
        <div class="hamburger-icon">
          <a href=""><img src="../img/hamburger.svg" alt=""></a>
        </div>
         <div class="logo">
        <img src="../img/logo.png" alt="Octom logo">
      </div>

      <!-- Menu List -->
      <nav class="menu">
        <a href=""><img src="../img/dashboard-icon.svg" alt="dashboard icon"></a>
        <a href=""><img src="../img/timeline.svg" alt="timeline icon"></a>
        <a href=""><img src="../img/task.svg" alt="task icon"></a>
        <a href=""><img src="../img/settings.svg" alt="settings icon"></a>
        <a href=""><img src="../img/messages.svg" alt="messages icon"></a>
        <a href=""><img src="../img/folder.svg" alt="folder icon"></a>
      </nav>
      </div>
    </aside>
    <div class="files-nav-context">
      <!-- Profile Bar -->
      <div class="profile-bar">
        <div class="search-icon">
          <label for="text"></label>
          <input type="text" placeholder="Search anything.. ">
        </div>
        <div class="profile-details">
          <img src="../img/notification-icon.svg" alt="notification-icon">
          <img src="../img/profile-avatar.svg" alt="Avatar">
        </div>
      </div>
      <div class="file-context">
        <div class="files-text-button">
          <div class="files-text">
            <h2>Files</h2>
          </div>
          <div class="files-button">
            <button class="btn1">+Create New Folder</button>
            <button class="btn2">Upload</button>
          </div>
        </div>
        <!-- Main-content -->
        <div class="all-files">
          <div class="allfiles-nav">
            <div class="files-nav1">
              <div class="file-img">
                <img src="../img/upload-file.svg" alt="" class="nav-file">
                <img src="../img/arrow-down.svg" alt="" class="arrow-down">
              </div>
              <h3>All files</h3>
            </div>
            <div class="files-nav2">
              <h3>Show all</h3>
              <img src="../img/arrow-down.svg" alt="" class="arrow-down">
          </div>

          <!-- File Card -->
          <div class="files-card">
            <div class="card1-img-text">
              <div class="card-img">
                <img src="../img/upload-file.svg" alt="">
                <img src="../img/AB.svg" alt="">
              </div>
                <div class="card-text">
                  <h2>Documents</h2>
                  <p>24 files</p>
                </div>
            </div>
            <div class="card1-img-text">
              <div class="card-img">
                <img src="../img/upload-file.svg" alt="">
                <img src="../img/AB.svg" alt="">
              </div>
                <div class="card-text">
                  <h2>Music</h2>
                  <p>108 files</p>
                </div>
            </div>
            <div class="card1-img-text">
              <div class="card-img">
                <img src="../img/upload-file.svg" alt="">
                <img src="../img/AB.svg" alt="">
              </div>
                <div class="card-text">
                  <h2>Work Projects</h2>
                  <p>84 files</p>
                </div>
            </div>
            <div class="card1-img-text">
              <div class="card-img">
                <img src="../img/upload-file.svg" alt="">
                <img src="../img/AB.svg" alt="">
              </div>
                <div class="card-text">
                  <h2>Personal Media</h2>
                  <p>2450 files</p>
                </div>
            </div>
            <div class="card1-img-text">
              <div class="card-img">
                <img src="../img/upload-file.svg" alt="">
                <img src="../img/AB.svg" alt="">
              </div>
                <div class="card-text">
                  <h2>Reddingo Backup</h2>
                  <p>22 files</p>
                </div>
            </div>
            <div class="card1-img-text">
              <div class="card-img">
                <img src="../img/upload-file.svg" alt="">
                <img src="../img/AB.svg" alt="">
              </div>
                <div class="card-text">
                  <h2>Root</h2>
                  <p>105 files</p>
                </div>
            </div>
          </div>
        </div>
        <!-- Right box -->
        <div class="available-storage">
          <div class="memory-storage">
            <div class="storage-img-text">
              <div class="storage-img">
              <img src="../img/storage-icon.png" alt="">
            </div>
            <div class="storage-text">
              <h3>Available storage</h3>
              <p>130GB/512GB</p>
            </div>
            </div>
          </div>
          <div class="storage-records">
            <div class="records">
              <div class="record-img">
                <img src="../img/media.svg" alt="">
              </div>
              <div class="record-text">
                <div class="h3">Media</div>
                <p>86GB</p>
                <div class="text-img">
                  <img src="../img/media-line.png" alt="">
                </div>
              </div>
            </div>
            <div class="records">
              <div class="record-img">
                <img src="../img/documents.svg" alt="">
              </div>
              <div class="record-text">
                <div class="h3">Documents</div>
                <p>26GB</p>
                <div class="text-img">
                  <img src="../img/doc-line.png" alt="">
                </div>
              </div>
            </div>
            <div class="record">
              <div class="record-img">
                <img src="../img/Music.svg" alt="">
              </div>
              <div class="record-text">
                <div class="h3">Music</div>
                <p>10GB</p>
                <div class="text-img">
                  <img src="../img/music-line.png" alt="">
                </div>
              </div>
            </div>
            <div class="record">
              <div class="record-img">
                <img src="../img/other-files.svg" alt="">
              </div>
              <div class="record-text">
                <div class="h3">Other files</div>
                <p>18GB</p>
                <div class="text-img">
                  <img src="../img/file-line.png" alt="">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    </div>
    </main>
</body>
</html>

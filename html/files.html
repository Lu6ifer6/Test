<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Files</title>
    <link rel="stylesheet" href="../css/files.css">
    <link rel="shortcut icon" href="../img/logo.png" type="image/x-icon">
</head>
<body>
    <main class="files-container">

    <!-- Side bar -->
    <aside class="sidebar">
      <div class="logo">
        <img src="../img/logo.png" alt="Octom logo">
      </div>

      <!-- Menu List -->
      <nav class="menu">
        <a href=""><img src="../img/dashboard-icon.svg" alt="dashboard icon"></a>
        <a href=""><img src="../img/timeline.svg" alt="timeline icon"></a>
        <a href=""><img src="../img/task.svg" alt="task icon"></a>
        <a href=""><img src="../img/settings.svg" alt="settings icon"></a>
        <a href=""><img src="../img/messages.svg" alt="messages icon"></a>
        <a href=""><img src="../img/folder.svg" alt="folder icon"></a>
      </nav>
    </aside>
    <aside class="hamburger-menu">
      <div class="hamburger">
        <div class="hamburger-icon">
          <a href=""><img src="../img/hamburger.svg" alt=""></a>
        </div>
         <div class="logo">
        <img src="../img/logo.png" alt="Octom logo">
      </div>

      <!-- Menu List -->
      <nav class="menu">
        <a href=""><img src="../img/dashboard-icon.svg" alt="dashboard icon"></a>
        <a href=""><img src="../img/timeline.svg" alt="timeline icon"></a>
        <a href=""><img src="../img/task.svg" alt="task icon"></a>
        <a href=""><img src="../img/settings.svg" alt="settings icon"></a>
        <a href=""><img src="../img/messages.svg" alt="messages icon"></a>
        <a href=""><img src="../img/folder.svg" alt="folder icon"></a>
      </nav>
      </div>
    </aside>
    <div class="files-nav-context">
      <!-- Profile Bar -->
      <div class="profile-bar">
        <div class="search-icon">
          <label for="text"></label>
          <input type="text" placeholder="Search anything.. ">
        </div>
        <div class="profile-details">
          <img src="../img/notification-icon.svg" alt="notification-icon">
          <img src="../img/profile-avatar.svg" alt="Avatar">
        </div>
      </div>
      <div class="files-context">
        <div class="files-text-button">
          <div class="files text">
            <h2>Files</h2>
          </div>
          <div class="files-button">
            <button>+Create New Folder</button>
            <button>Upload</button>
          </div>
        </div>
      </div>
    </div>
    
    </main>
</body>
</html>

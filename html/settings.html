<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Octom. Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/settings.css">
    <link rel="shortcut icon" href="../img/logo.png" type="image/x-icon">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <a href="../index.html"><img src="../img/logo.png" alt="logo image"></a>
            </div>
            
            <nav class="nav-links">
                <a href="../html/dashboard.html" class="nav-item"><img src="../img/dashboard-icon.svg" alt=""></a>
                <a href="#" class="nav-item"><img src="../img/timeline.svg" alt=""></a>
                <a href="#" class="nav-item"><img src="../img/task.svg" alt=""></a>
                <a href="../html/settings.html" class="nav-item"><img src="../img/settings.svg" alt=""></a>
                <a href="#" class="nav-item"><img src="../img/messages.svg" alt=""></a>
                <a href="../html/files.html" class="nav-item"><img src="../img/folder.svg" alt=""></a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="hamburger-btn" id="hamburger-btn">
                        <i class='bx bx-menu'></i>
                    </button>
                    <div class="search-bar">
                        <i class='bx bx-search'></i>
                        <input type="text" placeholder="Search anything...">
                    </div>
                </div>
                <div class="header-right">
                    <div class="notification-wrapper">
                        <i class='bx bx-bell'></i>
                        <span class="badge">2</span>
                    </div>
                    <div class="user-profile">
                        <img src="../img/profile-avatar.svg" alt="User Avatar">
                        <i class='bx bx-chevron-down'></i>
                    </div>
                </div>
            </header>

            <div class="content-body">
                <div class="profile-header-section">
                    <div class="cover-photo"></div>
                    <div class="profile-info-wrapper">
                        <div class="profile-avatar">
                            <img src="../img/profile-pic.svg" alt="Profile Picture">
                        </div>
                    </div>
                </div>

                <div class="settings-title-row">
                    <h1>Settings</h1>
                    <div class="action-buttons">
                        <button class="btn btn-cancel">Cancel</button>
                        <button class="btn btn-save">Save</button>
                    </div>
                </div>

                <nav class="secondary-nav">
                    <ul>
                        <li>My details</li>
                        <li>Profile</li>
                        <li>Password</li>
                        <li>Team</li>
                        <li>Plan</li>
                        <li>Billing</li>
                        <li>Email</li>
                        <li>Notifications</li>
                    </ul>
                </nav>

                <form class="settings-form" onsubmit="event.preventDefault();">
                    <div class="form-row split-row">
                        <div class="input-group">
                            <label for="first-name">First name</label>
                            <input type="text" id="first-name" value="Lucifer">
                        </div>
                        <div class="input-group">
                            <label for="last-name">Last name</label>
                            <input type="text" id="last-name" value="Annunaki">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="email">Email</label>
                            <div class="input-with-icon">
                                <i class='bx bx-envelope'></i>
                                <input type="email" id="email" value="luciferannunaki@gmail.com">
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="upload-area">
                            <div class="upload-icon">
                                <i class='bx bx-cloud-upload'></i>
                            </div>
                            <p>Click to upload or drag and drop<br>SVG, PNG, JPG or GIF (max, 800x400px)</p>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="role">Role</label>
                            <input type="text" id="role" value="Product Designer">
                        </div>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="../javascript/settings.js"></script>
</body>
</html>
